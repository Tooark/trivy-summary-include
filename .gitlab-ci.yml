spec:
  inputs:
    # Trivy
    trivy-activated:
      description: "Activate Trivy scan"
      type: boolean
      default: true
    stage:
      description: "Stage to run"
      type: string
      # Modificar para sca(software composition analysis) futuramente com Sourcegraph
      default: scan
    docker-image:
      description: "Docker image name"
      type: string
    severity-exit1:
      type: string
      description: "Severity to exit code 1 on analysis"
      default: ""
    architecture:
      description: "Architecture (amd64 or arm64)"
      type: string
      default: ""
    # Hadolint
    hadolint-activated:
      description: "Activate Hadolint Dockerfile lint"
      type: boolean
      default: true
    hadolint-stage:
      description: "Stage to run Hadolint"
      type: string
      default: sast
    dockerfile:
      description: "Path to the Dockerfile to lint"
      type: string
      default: "Dockerfile"
    hadolint-fail-on-findings:
      description: "If true, Hadolint job fails when issues are reported"
      type: string
      default: "false"
    # DefectDojo
    defectdojo-activated:
      description: "Enable DefectDojo import (shared by Trivy and Hadolint)"
      type: boolean
      default: false
    defectdojo-url:
      description: "DefectDojo base URL (e.g., https://defectdojo.example)"
      type: string
      default: ""
    defectdojo-api-key:
      description: "DefectDojo API key (recommended set as CI/CD variable)"
      type: string
      default: ""
    defectdojo-product-name:
      description: "DefectDojo product name (auto_create_context)"
      type: string
      default: ""
    defectdojo-engagement-name:
      description: "DefectDojo engagement name (auto_create_context)"
      type: string
      default: ""
    defectdojo-product-type-name:
      description: "DefectDojo product type name (used to create product on first run)"
      type: string
      default: ""
    defectdojo-trivy-product-type-name:
      description: "DefectDojo product type name for Trivy uploads (optional override)"
      type: string
      default: "Trivy Scan"
    defectdojo-hadolint-product-type-name:
      description: "DefectDojo product type name for Hadolint uploads (optional override)"
      type: string
      default: "Hadolint Dockerfile check"
    defectdojo-engagement-id:
      description: "DefectDojo engagement ID (fallback when names are not used)"
      type: string
      default: ""
---

stages:
- $[[ inputs.hadolint-stage ]]
- scan
- sca

variables:
  TRIVY_IMAGE_JSON: "sca-container-scanning-report.json"
  TRIVY_FS_JSON: "sca-fs-scanning-report.json"
  TRIVY_REPO_JSON: "sca-repo-scanning-report.json"
  TRIVY_IMAGE_LICENSE_JSON: "sca-container-license-report.json"
  TRIVY_FS_LICENSE_JSON: "sca-fs-license-report.json"
  TRIVY_REPO_LICENSE_JSON: "sca-repo-license-report.json"
  TRIVY_IMAGE_SBOM_JSON: "sca-container-sbom.cyclonedx.json"
  TRIVY_FS_SBOM_JSON: "sca-fs-sbom.cyclonedx.json"
  TRIVY_REPO_SBOM_JSON: "sca-repo-sbom.cyclonedx.json"
  TRIVY_IMAGE: public.ecr.aws/n6a9k4a7/deploy:1-trivy
  HADOLINT_JSON: "hadolint-report.json"
  DOCKERFILE: "$[[ inputs.dockerfile ]]"
  HADOLINT_FAIL_ON_FINDINGS: "$[[ inputs.hadolint-fail-on-findings ]]"
  DD_ACTIVATED: "$[[ inputs.defectdojo-activated ]]"
  DD_URL: "$[[ inputs.defectdojo-url ]]"
  DD_TOKEN: "$[[ inputs.defectdojo-api-key ]]"
  DD_PRODUCT: "$[[ inputs.defectdojo-product-name ]]"
  DD_ENGAGEMENT_NAME: "$[[ inputs.defectdojo-engagement-name ]]"
  DD_PRODUCT_TYPE: "$[[ inputs.defectdojo-product-type-name ]]"
  DD_TRIVY_PRODUCT_TYPE: "$[[ inputs.defectdojo-trivy-product-type-name ]]"
  DD_HADOLINT_PRODUCT_TYPE: "$[[ inputs.defectdojo-hadolint-product-type-name ]]"
  DD_ENGAGEMENT_ID: "$[[ inputs.defectdojo-engagement-id ]]"
  SEVERITY_EXIT1: "$[[ inputs.severity-exit1 ]]"
  DOCKER_IMAGE_REF: "$[[ inputs.docker-image ]]"

default:
  retry:
    max: 2
    when:
    - runner_system_failure
    - stuck_or_timeout_failure
    - unknown_failure
    - api_failure
    - job_execution_timeout

# Shared library for DefectDojo reimport API calls, used by both Trivy and Hadolint jobs
.defectdojo_lib:
  script:
  - |
    dd_reimport() {
      file="$1"; scan_type="$2"; test_title="$3"; job_product_type="$4"
      [ -f "$file" ] || { echo "skip (no file): $file"; return 0; }
      if [ "$DD_ACTIVATED" != "true" ] || [ -z "$DD_URL" ] || [ -z "$DD_TOKEN" ]; then
        echo "DefectDojo desativado ou variaveis ausentes - pulando upload: $file"
        return 0
      fi
      if [ -z "$DD_PRODUCT" ] && [ -z "$DD_ENGAGEMENT_ID" ]; then
        echo "ERROR: DD_PRODUCT (or DD_ENGAGEMENT_ID) is required when DefectDojo is activated"
        return 1
      fi

      # Backward compatible fallback: job-specific value -> global value.
      [ -n "$job_product_type" ] || job_product_type="$DD_PRODUCT_TYPE"

      # If we are creating context by product/engagement names, check if product exists.
      PRODUCT_EXISTS=true
      if [ -z "$DD_ENGAGEMENT_ID" ] && [ -n "$DD_PRODUCT" ]; then
        PRODUCT_QUERY=$(jq -rn --arg value "$DD_PRODUCT" '$value|@uri')
        PRODUCT_LOOKUP_URL="$DD_URL/api/v2/products/?name=$PRODUCT_QUERY"
        PRODUCT_RESPONSE=$(curl -k -sS -H "Authorization: Token $DD_TOKEN" "$PRODUCT_LOOKUP_URL") || {
          echo "ERROR: product lookup failed for '$DD_PRODUCT'"
          return 1
        }
        PRODUCT_EXISTS=$(printf '%s' "$PRODUCT_RESPONSE" | jq -r --arg name "$DD_PRODUCT" 'any(.results[]?; .name == $name)')
      fi

      echo "Reimport -> DefectDojo: $file ($scan_type / $test_title)"
      set -- -k -sS -X POST "$DD_URL/api/v2/reimport-scan/" \
        -H "Authorization: Token $DD_TOKEN" \
        -F "file=@$file" \
        -F "scan_type=$scan_type" \
        -F "test_title=$test_title" \
        -F "close_old_findings=true" \
        -F "active=true" \
        -F "verified=false" \
        -F "minimum_severity=Info"
      if [ -n "$DD_ENGAGEMENT_ID" ]; then
        set -- "$@" -F "engagement=$DD_ENGAGEMENT_ID"
      else
        set -- "$@" \
          -F "auto_create_context=true" \
          -F "product_name=$DD_PRODUCT" \
          -F "engagement_name=${DD_ENGAGEMENT_NAME:-CI/CD}"
        if [ "$PRODUCT_EXISTS" != "true" ]; then
          if [ -z "$job_product_type" ]; then
            echo "ERROR: product_type_name is required to create product '$DD_PRODUCT'"
            return 1
          fi
          set -- "$@" -F "product_type_name=$job_product_type"
        fi
      fi
      code=$(curl "$@" -o /tmp/dd_resp.json -w "%{http_code}") || {
        echo "curl failed: $file"
        return 1
      }
      echo "HTTP $code"; head -c 500 /tmp/dd_resp.json 2>/dev/null; echo
      case "$code" in
        2*) ;;
        *) echo "ERROR: DefectDojo reimport failed (HTTP $code)"; return 1 ;;
      esac
    }

.trivy_script:
  script:
  - !reference [ .defectdojo_lib, script ]
  - |
    set -e

    trivy image -f json      -o "$TRIVY_IMAGE_JSON"          "$DOCKER_IMAGE_REF"
    trivy image --scanners license -f json -o "$TRIVY_IMAGE_LICENSE_JSON" "$DOCKER_IMAGE_REF"
    trivy image -f cyclonedx -o "$TRIVY_IMAGE_SBOM_JSON"     "$DOCKER_IMAGE_REF"
    trivy fs    -f json      -o "$TRIVY_FS_JSON"             .
    trivy fs --scanners license -f json -o "$TRIVY_FS_LICENSE_JSON" .
    trivy fs    -f cyclonedx -o "$TRIVY_FS_SBOM_JSON"        .
    trivy repo  -f json      -o "$TRIVY_REPO_JSON"           ./
    trivy repo --scanners license -f json -o "$TRIVY_REPO_LICENSE_JSON" ./
    trivy repo  -f cyclonedx -o "$TRIVY_REPO_SBOM_JSON"      ./

    trivy_table_from_json() {
      in_json="$1"; title="$2"
      [ -f "$in_json" ] || { echo "skip table (no file): $in_json"; return 0; }

      # Reuse JSON results to avoid running a second vulnerability scan.
      echo "===== $title (table) ====="
      if trivy convert --format table "$in_json"; then
        true
      else
        echo "Trivy convert nao disponivel para: $in_json (seguindo sem tabela)"
      fi
    }

    trivy_table_from_json "$TRIVY_IMAGE_JSON" "Trivy container vulnerabilities"
    trivy_table_from_json "$TRIVY_FS_JSON"    "Trivy filesystem vulnerabilities"
    trivy_table_from_json "$TRIVY_REPO_JSON"  "Trivy repository vulnerabilities"

    sum_sev() {
      sev="$1"; total=0
      for f in "$TRIVY_IMAGE_JSON" "$TRIVY_FS_JSON" "$TRIVY_REPO_JSON"; do
        [ -f "$f" ] || continue
        n=$(jq "[.Results[]?.Vulnerabilities[]? | select(.Severity==\"$sev\")] | length" "$f" 2>/dev/null || echo 0)
        total=$((total + n))
      done
      echo "$total"
    }
    critical=$(sum_sev CRITICAL); high=$(sum_sev HIGH); medium=$(sum_sev MEDIUM)
    low=$(sum_sev LOW); unknown=$(sum_sev UNKNOWN)
    total=$((critical + high + medium + low + unknown))
    {
      echo "CRITICAL_COUNT=$critical"
      echo "HIGH_COUNT=$high"
      echo "MEDIUM_COUNT=$medium"
      echo "LOW_COUNT=$low"
      echo "UNKNOWN_COUNT=$unknown"
      echo "TOTAL_COUNT=$total"
    } >> variables.env
    echo "Trivy summary: C=$critical H=$high M=$medium L=$low U=$unknown T=$total"

    # Send only container vulnerability report to DefectDojo.
    dd_reimport "$TRIVY_IMAGE_JSON" "Trivy Scan" "Trivy - container vulns" "$DD_TRIVY_PRODUCT_TYPE"

    if [ -n "$SEVERITY_EXIT1" ]; then
      trivy image --severity "$SEVERITY_EXIT1" --exit-code 1 "$DOCKER_IMAGE_REF"
    fi

.trivy_artifacts:
  artifacts:
    paths:
    - $TRIVY_IMAGE_JSON
    - $TRIVY_IMAGE_LICENSE_JSON
    - $TRIVY_IMAGE_SBOM_JSON
    - $TRIVY_FS_JSON
    - $TRIVY_FS_LICENSE_JSON
    - $TRIVY_FS_SBOM_JSON
    - $TRIVY_REPO_JSON
    - $TRIVY_REPO_LICENSE_JSON
    - $TRIVY_REPO_SBOM_JSON
    - variables.env
    reports:
      dotenv: variables.env
    untracked: false
    when: on_success
    access: developer
    expire_in: "1 day"

.docker_scan:
  rules:
  - if: '"$[[ inputs.architecture | expand_vars ]]" == "" || "$[[ inputs.trivy-activated ]]" == "true"'
  stage: $[[inputs.stage]]
  needs:
  - job: hadolint
    optional: true
  image: $TRIVY_IMAGE
  before_script:
  - apk add --no-cache jq docker curl
  script:
  - !reference [ .trivy_script, script ]
  artifacts: !reference [ .trivy_artifacts, artifacts ]

.docker_scan_amd64:
  rules:
  - if: '"$[[ inputs.architecture | expand_vars ]]" == "amd64" || "$[[ inputs.trivy-activated ]]" == "true"'
  stage: $[[inputs.stage]]
  needs:
  - job: hadolint
    optional: true
  image: aquasec/trivy:latest
  before_script:
  - apk add --no-cache jq docker curl
  script:
  - !reference [ .trivy_script, script ]
  artifacts: !reference [ .trivy_artifacts, artifacts ]
  tags:
  - amd64

hadolint:
  rules:
  - if: '"$[[ inputs.hadolint-activated ]]" == "true"'
  stage: $[[ inputs.hadolint-stage ]]
  image:
    name: hadolint/hadolint:latest-alpine
    entrypoint: [ "" ]
  before_script:
  - apk add --no-cache curl jq
  script:
  - !reference [ .defectdojo_lib, script ]
  - |
    if [ ! -f "$DOCKERFILE" ]; then
      echo "Dockerfile nao encontrado em: $DOCKERFILE" && exit 1
    fi
    # hadolint exits non-zero when it finds issues; capture output regardless.
    hadolint -f json "$DOCKERFILE" > "$HADOLINT_JSON" || true
    echo "Hadolint findings:"; jq 'length' "$HADOLINT_JSON" 2>/dev/null || echo "?"

    dd_reimport "$HADOLINT_JSON" "Hadolint Dockerfile check" "SAST" "$DD_HADOLINT_PRODUCT_TYPE"

    if [ "$HADOLINT_FAIL_ON_FINDINGS" = "true" ]; then
      N=$(jq 'length' "$HADOLINT_JSON" 2>/dev/null || echo 0)
      if [ "${N:-0}" -gt 0 ]; then
        echo "Hadolint encontrou $N problema(s) e hadolint-fail-on-findings=true" && exit 1
      fi
    fi
  artifacts:
    when: always
    paths:
    - $HADOLINT_JSON
    expire_in: 7 days
  allow_failure: true
